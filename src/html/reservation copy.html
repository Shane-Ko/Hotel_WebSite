<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RESERVATION</title>
  <link rel="stylesheet" href="/src/css/my-header.css" />
  <link rel="stylesheet" href="/src/css/my-footer.css" />
  <link rel="stylesheet" href="/src/css/reservation.css" />
  <script src="/src/js/my-header.js" defer></script>
  <script src="/src/js/my-footer.js" defer></script>
  <script src="/src/js/reservation.js" defer></script>
</head>

<body>
  <my-header></my-header>

  <section class="topTitle">
    <div class="text">
      <h2>RESERVATION</h2>
      <p>실시간예약</p>
    </div>
  </section>

  <!-- MAIN -->
  <main class="reservation-main">
    <div class="reservation-container">

      <!-- 방 이름 -->
      <h2 class="room-name" id="roomName">STANDARD</h2>

      <!-- 좌: 이미지 / 우: 캘린더+예약 -->
      <div class="reservation-body">

        <!-- LEFT: 이미지 영역 -->
        <div class="room-images">
          <div class="main-image">
            <img id="mainImage" src="" alt="main room image" />
          </div>
          <ul class="thumb-list" id="thumbList">
            <!-- JS: thumbnail li들 append -->
          </ul>
        </div>

        <!-- RIGHT: 캘린더 + 옵션 + 결제 -->
        <div class="room-booking">
          <!-- 캘린더 헤더 -->
          <div class="calendar-header">
            <button class="cal-prev" id="calPrev" aria-label="이전 달">&lt;</button>
            <span class="cal-title" id="calTitle">2026년 07월</span>
            <button class="cal-next" id="calNext" aria-label="다음 달">&gt;</button>
          </div>

          <!-- 요일 -->
          <div class="calendar-weekdays">
            <span class="sun">일</span>
            <span>월</span>
            <span>화</span>
            <span>수</span>
            <span>목</span>
            <span>금</span>
            <span class="sat">토</span>
          </div>

          <!-- 날짜 그리드 -->
          <div class="calendar-grid" id="calendarGrid">
            <!-- JS: 날짜 셀 append -->
          </div>

          <!-- 추가 인원 -->
          <div class="extra-guest-row">
            <span class="label">추가 인원</span>
            <div class="dropdown">
              <select id="extraGuest">
                <option value="0">없음</option>
                <option value="1">1명</option>
                <option value="2">2명</option>
              </select>
            </div>
            <span class="desc" id="extraDesc">기준 인원 2명, 추가 시 한 명당 객실 가격의 20%↑</span>
          </div>

          <!-- 총 합계 -->
          <div class="total-row">
            <span class="label">총 합계</span>
            <span class="price">
              <strong id="totalPrice">0</strong> 원
            </span>
          </div>

          <!-- 버튼 -->
          <div class="btn-row">
            <button class="btn-cancel" id="btnCancel">취소</button>
            <button class="btn-reserve" id="btnReserve">예약하기</button>
          </div>
        </div>
      </div>

      <!-- 방 설명 -->
      <p class="room-desc" id="roomDesc"></p>
      <p class="room-desc-eng" id="roomDescEng"></p>
    </div>
  </main>

  <my-footer></my-footer>
</body>

</html>
